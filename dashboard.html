<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>黄金智投助手</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif}
body{background:#0a0e1a;color:#e0e6f0;min-height:100vh;padding:20px}
.container{max-width:800px;margin:0 auto}
h1{font-size:24px;margin-bottom:20px;color:#f0b90b;display:flex;align-items:center;gap:10px}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px}
.card{background:#131a2e;border-radius:12px;padding:16px;border:1px solid #1e2a45}
.card h3{font-size:12px;color:#8892b0;margin-bottom:6px;text-transform:uppercase;letter-spacing:1px}
.card .value{font-size:28px;font-weight:700;color:#fff}
.card .value.gold{color:#f0b90b}
.card .value.red{color:#f23645}
.card .value.green{color:#00c853}
.card .change{font-size:12px;color:#8892b0;margin-top:4px}
.card .label{font-size:13px;color:#8892b0;margin-top:2px}
.full{grid-column:1/-1}
.news-item{padding:8px 0;border-bottom:1px solid #1e2a45;font-size:13px;line-height:1.4}
.news-item:last-child{border:none}
.news-item .time{font-size:11px;color:#8892b0;margin-right:8px}
.news-item .src{font-size:11px;color:#f0b90b;margin-left:8px}
.footer{text-align:center;color:#4a5568;font-size:12px;margin-top:20px;padding:10px}
.tag{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;background:#1e2a45;color:#8892b0;margin-left:8px}
.chart-box{height:120px;background:#0d1525;border-radius:8px;margin-top:10px;display:flex;align-items:center;justify-content:center;color:#4a5568;font-size:12px;border:1px dashed #1e2a45}
</style>
</head>
<body>
<div class="container">
<h1>🥇 黄金智投助手</h1>
<div class="grid">
<div class="card">
<h3>国际金价 (XAU/USD)</h3>
<div class="value gold" id="goldUsd">--</div>
<div class="label">$/oz &bull; <span id="goldUsdTime">--</span></div>
</div>
<div class="card">
<h3>人民币金价</h3>
<div class="value gold" id="goldCny">--</div>
<div class="label">元/克 &bull; <span id="goldCnyTime">--</span></div>
</div>
<div class="card">
<h3>伦敦金 (XAU/GBP)</h3>
<div class="value" id="londonGold">--</div>
<div class="label">英镮/盎司</div>
</div>
<div class="card">
<h3>美元指数 (DXY)</h3>
<div class="value" id="dxy">--</div>
<div class="label">指数</div>
</div>
</div>
<div class="grid">
<div class="card full">
<h3>AU9999 国内现货金</h3>
<div class="value gold" id="au9999">--</div>
<div class="label">元/克 &bull; 上海黄金交易所</div>
</div>
</div>
<div class="card full">
<h3>📰 黄金新闻</h3>
<div id="newsSection">加载中...</div>
</div>
<div class="footer">
黄金智投助手 &bull; 数据每30秒自动刷新
</div>
</div>
<script>
async function refresh(){
try{
var r=await fetch('/api/data');var d=await r.json();
if(d.gold_usd){document.getElementById('goldUsd').textContent='$'+d.gold_usd.toFixed(2)}
if(d.gold_cny){document.getElementById('goldCny').textContent=d.gold_cny}
if(d.dxy){document.getElementById('dxy').textContent=d.dxy.toFixed(2)}
if(d.time){document.getElementById('goldUsdTime').textContent=d.time;document.getElementById('goldCnyTime').textContent=d.time}
if(d.london_gold){document.getElementById('londonGold').textContent=d.london_gold}
if(d.au9999){document.getElementById('au9999').textContent=d.au9999}
if(d.news){var h='';d.news.slice(0,10).forEach(function(n){var t=n.title_cn||n.title||'?';h+='<div class="news-item"><span class="time">'+(n.time||'')+'</span>'+t+'<span class="src">'+n.source+'</span></div>'});document.getElementById('newsSection').innerHTML=h}
}catch(e){}
}
refresh();
setInterval(refresh,30000);
</script>
</body>
</html>
